<!DOCTYPE html>
<html lang="en" class="no-js">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<meta name="description" content="Demo for the tutorial on how to create a 3D cardboard box that folds and unfolds on scroll using Three.js and the GSAP ScrollTrigger." />
		<meta name="keywords" content="cardboard box, on-scroll animation, three.js, unfolding, gsap scrolltrigger" />
		<meta name="author" content="Ksenia Kondrashova for Codrops" />
		<link rel="shortcut icon" href="favicon.ico">
		<link rel="stylesheet" type="text/css" href="/static/css/3d.css" />

		<script>document.documentElement.className="js";var supportsCssVars=function(){var e,t=document.createElement("style");return t.innerHTML="root: { --tmp-var: bold; }",document.head.appendChild(t),e=!!(window.CSS&&window.CSS.supports&&window.CSS.supports("font-weight","var(--tmp-var)")),t.parentNode.removeChild(t),e};supportsCssVars()||alert("Please view this demo in a modern browser that supports CSS Variables.");</script>
	</head>
	<body>
		<main>

<div class="content">
  <div class="page">
    <div class="container">
      <canvas id="box-canvas"></canvas>
      <div class="ui-controls">
        <button class="unbutton ui-controls__button" id="zoom-in" aria-label="Zoom in">+</button>
        <button class="unbutton ui-controls__button" id="zoom-out" aria-label="Zoom out">-</button>
        <div>Scroll to animate</div>
        <div class="dimension-inputs" style="margin-top: 1rem;">
          <div><label>Length: <input type="number" id="input-length" value="80" /></label></div>
          <div><label>Width: <input type="number" id="input-width" value="27" /></label></div>
          <div><label>Depth: <input type="number" id="input-depth" value="45" /></label></div>
          <button id="renderBox" style="margin-top: 0.5rem;">Render Box</button>
        </div>
      </div>
    </div>
  </div>
</div>

		</main>
		<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
		<script type="importmap">
		  {
			"imports": {
			  "three": "https://unpkg.com/three@0.138.0/build/three.module.js",
			  "three/addons/": "https://unpkg.com/three@0.138.0/examples/jsm/"
			}
		  }
		</script>

		<script src='https://unpkg.co/gsap@3/dist/gsap.min.js'></script>
		<script src='https://unpkg.co/gsap@3/dist/ScrollTrigger.min.js'></script>

		<script type="module" src="/static/js/boxanimation.js"></script>
		<script>
  window.addEventListener("message", (event) => {
    if (event.data?.type === "render-box") {
      document.querySelector("#input-length").value = event.data.length;
      document.querySelector("#input-width").value = event.data.width;
      document.querySelector("#input-depth").value = event.data.height;
      document.querySelector("#renderBox").click();
    }
  });
</script>

	</body>
</html>
