<!-- templates/track.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Track Parcel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>#map { height: 90vh; width: 100%; }</style>
</head>
<body>
    <h2>Tracking Parcel: {{ parcel_id }}</h2>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([28.6139, 77.2090], 10); // Default: Delhi

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        fetch("/get_location/{{ parcel_id }}")
        .then(res => res.json())
        .then(data => {
            if (data.lat && data.lng) {
                L.marker([data.lat, data.lng])
                    .addTo(map)
                    .bindPopup("Last seen at: " + data.time)
                    .openPopup();
                map.setView([data.lat, data.lng], 15);
            } else {
                alert("No location found");
            }
        });
    </script>
</body>
</html>
